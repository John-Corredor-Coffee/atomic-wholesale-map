#progress-text{font-size:10px;color:#555;margin-top:3px;}
#map{flex:1;}

// ─── CATEGORY DETECTION ───────────────────────────────────────────────────────
const CATS = {
  "Cafe/Coffee":    { color: "#6F4E37", text: "☕" },
  "Restaurant/Bar": { color: "#E53935", text: "🍽" },
  "Grocery/Market": { color: "#43A047", text: "🛒" },
  "Brewery":        { color: "#7B1FA2", text: "🍺" },
  "Hotel/Inn":      { color: "#1E88E5", text: "🏨" },
  "Bakery":         { color: "#FB8C00", text: "🥐" },
  "Corporate/Office":{ color: "#546E7A", text: "🏢" },
  "Fitness/Gym":    { color: "#00ACC1", text: "💪" },
  "Catering/Food Svc":{ color: "#F4511E", text: "🎪" },
  "Farm/Orchard":   { color: "#795548", text: "🌿" },
  "Ice Cream":      { color: "#EC407A", text: "🍦" },
  "Other":          { color: "#78909C", text: "📍" },
};

const DAY_COLORS = {
  "Monday":    "#F44336",
  "Tuesday":   "#FF9800",
  "Wednesday": "#4CAF50",
  "Thursday":  "#2196F3",
  "Friday":    "#9C27B0",
  "Ship":      "#607D8B",
};

function detectCategory(name) {
  const n = name.toLowerCase();
  if (/brew(ing|ery)|taproom|tap room|ale brew|distill|cider/.test(n)) return "Brewery";
  if (/crossfit|fitness|gym|cycle|cycling|bike shop/.test(n)) return "Fitness/Gym";
  if (/hotel|inn|resort|lodge|summercamp|mariner|nantucket hotel|marriott|sheraton|aloft|element hotel/.test(n)) return "Hotel/Inn";
  if (/whole foods|market|provisions|grocery|supermarket|crosby|roche bros|mckinnon|donelan|atkins farm|shaw's|ring bros|butcher boy|clements|pemberton farm|guido's|art's specialties|needham center|co-op|coop|general store|volante|weston provisions|davids fresh|american provisions|urban greens|meadowbrook farm|appleton|new england country|wards berry|automated food/.test(n)) return "Grocery/Market";
  if (/farm|orchard|vineyard|farm stand|berry farm/.test(n)) return "Farm/Orchard";
  if (/bakery|baking|bake shop|donut|bagels|bagel|bread|patisserie|cookie|pastry|monstah|crumbl/.test(n)) return "Bakery";
  if (/ice cream|gelato|sorbet|creamery/.test(n)) return "Ice Cream";
  if (/cafe|coffee|cup|roasters|espresso|cappuccino|bean|brew bar|nitro|pour|grind|grounds|coffeehouse/.test(n)) return "Cafe/Coffee";
  if (/catering|caterers|aramark|sodexo|compass group|gourmet|sipwithme|encore|gourmet caterers|prestige services|realfood/.test(n)) return "Catering/Food Svc";
  if (/analytics|energy|biomedical|pharmaceutical|lab|innovation|technology|reiser|nova bio|nova biomed|lga|cell signaling|formlabs|form energy|mass pay|greystar|reveneer|c-4|coordinates op|wood mackenzie|ezcater/.test(n)) return "Corporate/Office";
  if (/restaurant|kitchen|bistro|grille|grill|pub|bar|tavern|diner|eatery|supper|dining|ristorante|bbq|barbecue|sushi|steakhouse|brasserie|cantina|trattoria|osteria|seafood/.test(n)) return "Restaurant/Bar";
  return "Cafe/Coffee"; // default for most unknowns
}

function getDeliveryDay(tags) {
  const t = tags.map(x => x.toLowerCase());
  if (t.includes("monday")) return "Monday";
  if (t.includes("tuesday")) return "Tuesday";
  if (t.includes("wednesday")) return "Wednesday";
  if (t.includes("thursday")) return "Thursday";
  if (t.includes("friday")) return "Friday";
  if (tags.some(x => x === "Ship")) return "Ship";
  if (tags.some(x => x === "Pick-up")) return "Pick-up";
  return "Unknown";
}

function getFulfillment(tags) {
  if (tags.includes("local-dlv")) return "Local Delivery";
  if (tags.some(x => x === "Ship")) return "Ship";
  if (tags.some(x => x === "Pick-up")) return "Pick-up";
  if (tags.includes("copack")) return "Co-Pack";
  return "Unknown";
}

// ─── PROCESS DATA ─────────────────────────────────────────────────────────────
const LOCATIONS = RAW.map(([company, location, addr1, addr2, city, state, zip, tagsCsv], i) => {
  const tags = tagsCsv ? tagsCsv.split(",").map(t => t.trim()).filter(Boolean) : [];
  const displayName = location && location.trim() ? `${company} – ${location}` : company;
  const fullAddr = [addr1, addr2, city, state, zip].filter(Boolean).join(", ");
  return {
    id: i,
    company,
    location: displayName,
    addr1, addr2, city, state, zip,
    fullAddr,
    geocodeKey: `${addr1}, ${city}, ${state} ${zip}`,
    tags,
    category: detectCategory(company),
    deliveryDay: getDeliveryDay(tags),
    fulfillment: getFulfillment(tags),
    lat: null, lng: null,
  };
});

// ─── MAP SETUP ────────────────────────────────────────────────────────────────
const map = L.map("map").setView([42.42, -70.95], 9);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

const markerLayer = L.layerGroup().addTo(map);

function makeMarker(loc) {
  const cat = CATS[loc.category] || CATS["Other"];
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="32" viewBox="0 0 24 32">
    <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 20 12 20s12-11 12-20C24 5.4 18.6 0 12 0z" fill="${cat.color}" stroke="white" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="5" fill="white" opacity="0.9"/>
  </svg>`;
  const icon = L.divIcon({
    html: svg,
    iconSize: [24, 32],
    iconAnchor: [12, 32],
    popupAnchor: [0, -32],
    className: "",
  });

  const popup = `
    <b>${loc.location}</b>
    <div class="popup-category">${loc.category}</div>
    ${loc.addr1}${loc.addr2 ? ", "+loc.addr2 : ""}<br>
    ${loc.city}, ${loc.state} ${loc.zip}<br>
    <div style="margin-top:4px;">
      <span class="popup-tag" style="background:${DAY_COLORS[loc.deliveryDay]}20;color:${DAY_COLORS[loc.deliveryDay]};border:1px solid ${DAY_COLORS[loc.deliveryDay]}40;">${loc.deliveryDay}</span>
      <span class="popup-tag">${loc.fulfillment}</span>
    </div>`;

  return L.marker([loc.lat, loc.lng], { icon })
    .bindPopup(popup)
    .on("popupopen", () => map.setView([loc.lat, loc.lng], Math.max(map.getZoom(), 14)));
}

// ─── FILTERS ──────────────────────────────────────────────────────────────────
const FILTERABLE_DAYS = new Set(["Monday","Tuesday","Wednesday","Thursday","Friday","Ship"]);
let activeTypes = new Set(Object.keys(CATS));
let activeDays  = new Set(FILTERABLE_DAYS);

function countBy(arr, key, val) { return arr.filter(l => l.lat && l[key] === val).length; }

function buildFilters() {
  const typeDiv = document.getElementById("type-filters");
  const dayDiv  = document.getElementById("day-filters");

  // clear before rebuilding
  typeDiv.innerHTML = `<button class="filter-btn active" id="all-btn" onclick="toggleAll()">All Types</button>`;
  dayDiv.innerHTML  = "";

  Object.entries(CATS).forEach(([name, meta]) => {
    const c = countBy(LOCATIONS, "category", name);
    const btn = document.createElement("button");
    btn.className = "filter-btn active";
    btn.dataset.type = name;
    btn.innerHTML = `<span class="dot" style="background:${meta.color}"></span>${name}<span class="count">${c}</span>`;
    btn.onclick = () => toggleType(name, btn);
    typeDiv.appendChild(btn);
  });

  Object.entries(DAY_COLORS).forEach(([day, col]) => {
    const c = countBy(LOCATIONS, "deliveryDay", day);
    const btn = document.createElement("button");
    btn.className = "filter-btn active";
    btn.dataset.day = day;
    btn.innerHTML = `<span class="dot" style="background:${col}"></span>${day}<span class="count">${c}</span>`;
    btn.onclick = () => toggleDay(day, btn);
    dayDiv.appendChild(btn);
  });
}

function toggleType(name, btn) {
  if (activeTypes.has(name)) { activeTypes.delete(name); btn.classList.remove("active"); }
  else { activeTypes.add(name); btn.classList.add("active"); }
  refreshMarkers();
}

function toggleDay(day, btn) {
  if (activeDays.has(day)) { activeDays.delete(day); btn.classList.remove("active"); }
  else { activeDays.add(day); btn.classList.add("active"); }
  refreshMarkers();
}


function toggleAll() {
  const btn = document.getElementById("all-btn");
  const allOn = activeTypes.size === Object.keys(CATS).length;
  document.querySelectorAll("[data-type]").forEach(b => {
    if (allOn) { activeTypes.delete(b.dataset.type); b.classList.remove("active"); }
    else { activeTypes.add(b.dataset.type); b.classList.add("active"); }
  });
  btn.classList.toggle("active", !allOn);
  refreshMarkers();
}

function refreshMarkers() {
  markerLayer.clearLayers();
  let visible = 0;
  LOCATIONS.forEach(loc => {
    if (!loc.lat) return;
    if (!activeTypes.has(loc.category)) return;
    if (FILTERABLE_DAYS.has(loc.deliveryDay) && !activeDays.has(loc.deliveryDay)) return;
    markerLayer.addLayer(makeMarker(loc));
    visible++;
  });
  const placed = LOCATIONS.filter(l => l.lat).length;
  document.getElementById("stats-line").textContent =
    `${visible} shown · ${placed} geocoded / ${LOCATIONS.length} total`;
}

// ─── GEOCODING ────────────────────────────────────────────────────────────────
const CACHE_KEY = "acr_map_geo_v2";
let geoCache = {};
try { geoCache = JSON.parse(localStorage.getItem(CACHE_KEY)) || {}; } catch(e) {}

let geocodedCount = 0;
let geocodeQueue = [];
let geocodeRunning = false;

function updateProgress() {
  const total = LOCATIONS.length;
  const pct = Math.round(geocodedCount / total * 100);
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-text").textContent = `${geocodedCount} / ${total} geocoded`;
  if (geocodedCount >= total) {
    document.getElementById("progress-bar").style.display = "none";
    buildFilters();
    refreshMarkers();
    saveCache();
  }
}

async function geocodeOne(loc) {
  const key = loc.geocodeKey;
  if (geoCache[key]) {
    loc.lat = geoCache[key][0];
    loc.lng = geoCache[key][1];
    geocodedCount++;
    updateProgress();
    if (geocodedCount % 10 === 0) { buildFilters(); refreshMarkers(); }
    return;
  }
  try {
    const q = encodeURIComponent(`${loc.addr1}, ${loc.city}, ${loc.state} ${loc.zip}, USA`);
    const url = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&countrycodes=us`;
    const res = await fetch(url, { headers: { "Accept-Language": "en" } });
    const data = await res.json();
    if (data && data[0]) {
      loc.lat = parseFloat(data[0].lat);
      loc.lng = parseFloat(data[0].lon);
      geoCache[key] = [loc.lat, loc.lng];
    } else {
      // try city-level fallback
      const q2 = encodeURIComponent(`${loc.city}, ${loc.state} ${loc.zip}, USA`);
      const res2 = await fetch(`https://nominatim.openstreetmap.org/search?q=${q2}&format=json&limit=1&countrycodes=us`);
      const data2 = await res2.json();
      if (data2 && data2[0]) {
        loc.lat = parseFloat(data2[0].lat);
        loc.lng = parseFloat(data2[0].lon);
        geoCache[key] = [loc.lat, loc.lng];
      }
    }
  } catch(e) {}
  geocodedCount++;
  updateProgress();
  if (geocodedCount % 10 === 0) { buildFilters(); refreshMarkers(); }
}

function saveCache() {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(geoCache)); } catch(e) {}
}

async function runGeocodingQueue() {
  if (geocodeRunning) return;
  geocodeRunning = true;
  for (const loc of geocodeQueue) {
    await geocodeOne(loc);
    if (!geoCache[loc.geocodeKey]) continue; // was cached
    await new Promise(r => setTimeout(r, 1050)); // Nominatim 1 req/sec
  }
  geocodeRunning = false;
  saveCache();
}

// Load from cache first, queue the rest
const needGeocode = [];
LOCATIONS.forEach(loc => {
  const key = loc.geocodeKey;
  if (geoCache[key]) {
    loc.lat = geoCache[key][0];
    loc.lng = geoCache[key][1];
    geocodedCount++;
  } else {
    needGeocode.push(loc);
  }
});

geocodeQueue = needGeocode;
buildFilters();
refreshMarkers();
updateProgress();

if (needGeocode.length > 0) {
  runGeocodingQueue();
} else {
  document.getElementById("progress-bar").style.display = "none";
}
</script>
</body>
</html>
