<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{display:flex;height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#1a1a1a;}
#sidebar{width:280px;min-width:280px;background:#1e1e1e;color:#e0e0e0;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #333;}
#sidebar-header{padding:14px 16px 10px;border-bottom:1px solid #333;flex-shrink:0;}
#sidebar-header h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:0.02em;}
#sidebar-header p{font-size:11px;color:#888;margin-top:2px;}
#sidebar-scroll{flex:1;overflow-y:auto;padding:10px 12px;}
#sidebar-scroll::-webkit-scrollbar{width:4px;}
#sidebar-scroll::-webkit-scrollbar-thumb{background:#444;border-radius:2px;}
.filter-section{margin-bottom:14px;}
.filter-section h3{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:#777;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid #2a2a2a;}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.filter-btn{background:#2a2a2a;border:1px solid #3a3a3a;border-radius:4px;color:#ccc;padding:5px 8px;cursor:pointer;font-size:11px;text-align:left;display:flex;align-items:center;gap:6px;transition:all .15s;}
.filter-btn:hover{background:#333;}
.filter-btn.active{background:#333;border-color:#555;color:#fff;}
.filter-btn .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.filter-btn .count{margin-left:auto;font-size:10px;color:#666;font-variant-numeric:tabular-nums;}
.filter-btn.active .count{color:#999;}
#all-btn{grid-column:1/-1;background:#262626;justify-content:center;font-size:11.5px;font-weight:600;color:#bbb;padding:6px;}
#all-btn.active{background:#3a3a3a;color:#fff;}
#search-wrap{padding:8px 12px;border-bottom:1px solid #2a2a2a;flex-shrink:0;}
#search-input{width:100%;background:#2a2a2a;border:1px solid #3a3a3a;border-radius:4px;color:#e0e0e0;padding:6px 10px;font-size:12px;outline:none;font-family:inherit;box-sizing:border-box;}
#search-input::placeholder{color:#555;}
#search-input:focus{border-color:#666;}
#progress-bar{background:#2a2a2a;border-top:1px solid #333;padding:8px 12px;flex-shrink:0;}
#progress-bar p{font-size:10px;color:#666;margin-bottom:4px;}
#progress-track{background:#333;border-radius:2px;height:3px;}
#progress-fill{background:#4CAF50;border-radius:2px;height:100%;width:0%;transition:width .3s;}
#progress-text{font-size:10px;color:#555;margin-top:3px;}
#map{flex:1;}
.leaflet-popup-content-wrapper{border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.25);}
.leaflet-popup-content{font-size:12px;line-height:1.5;padding:2px 0;}
.leaflet-popup-content b{font-size:13px;display:block;margin-bottom:4px;color:#1a1a1a;}
.popup-tag{display:inline-block;background:#eee;border-radius:3px;padding:1px 6px;font-size:10px;margin:2px 2px 0 0;}
.popup-category{font-size:11px;color:#666;margin-bottom:3px;}
/* ─── ZONE MANAGEMENT ───────────────────────────────────────────────────────── */
.zone-item{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #262626;}
.zone-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.zone-name{flex:1;font-size:11px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.zone-vis{background:none;border:none;color:#555;cursor:pointer;font-size:11px;padding:0 3px;line-height:1;flex-shrink:0;}
.zone-vis.on{color:#aaa;}
.zone-edit-btn{background:#2a2a2a;border:1px solid #3a3a3a;border-radius:3px;color:#888;cursor:pointer;font-size:10px;padding:2px 7px;white-space:nowrap;flex-shrink:0;}
.zone-edit-btn:hover{background:#333;color:#ddd;}
#add-zone-btn{width:100%;background:transparent;border:1px dashed #3a3a3a;border-radius:4px;color:#555;padding:5px;font-size:11px;cursor:pointer;margin-top:8px;text-align:center;font-family:inherit;}
#add-zone-btn:hover{background:#222;color:#aaa;border-color:#555;}
#zone-edit-panel{background:#1a1a1a;border-top:1px solid #333;padding:10px 12px;flex-shrink:0;display:none;}
#zone-edit-panel.active{display:block;}
.ze-row{display:flex;gap:6px;align-items:center;margin-bottom:7px;}
#editing-color{width:30px;height:30px;border:1px solid #444;border-radius:4px;cursor:pointer;padding:2px;flex-shrink:0;background:#2a2a2a;}
#editing-name{flex:1;background:#2a2a2a;border:1px solid #3a3a3a;border-radius:4px;color:#e0e0e0;padding:5px 8px;font-size:12px;outline:none;font-family:inherit;}
#editing-name:focus{border-color:#555;}
.ze-actions{display:flex;gap:4px;}
.ze-done{flex:1;background:#1e3a1e;border:1px solid #2e5a2e;border-radius:3px;color:#81c784;padding:6px 8px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;}
.ze-done:hover{background:#254a25;}
.ze-del{background:#2a1818;border:1px solid #4a2828;border-radius:3px;color:#ef9a9a;padding:6px 8px;font-size:11px;cursor:pointer;font-family:inherit;}
.ze-del:hover{background:#3a1e1e;}
.ze-tip{font-size:10px;color:#444;margin-top:7px;text-align:center;line-height:1.4;}
#zone-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;align-items:center;justify-content:center;}
#zone-modal.open{display:flex;}
#zone-modal-box{background:#232323;border:1px solid #484848;border-radius:8px;padding:20px;width:260px;}
#zone-modal-box h3{font-size:14px;color:#fff;margin-bottom:14px;font-weight:700;}
.mf{margin-bottom:10px;}
.mf label{font-size:10px;color:#777;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px;}
.mf input[type=text]{width:100%;background:#2a2a2a;border:1px solid #3a3a3a;border-radius:4px;color:#e0e0e0;padding:6px 10px;font-size:12px;outline:none;font-family:inherit;box-sizing:border-box;}
.mf input[type=text]:focus{border-color:#555;}
.mf input[type=color]{width:100%;height:32px;border:1px solid #3a3a3a;border-radius:4px;cursor:pointer;background:#2a2a2a;padding:2px;}
.ma{display:flex;gap:6px;margin-top:14px;}
.ma button{flex:1;padding:8px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;}
.ma .mprimary{background:#4CAF50;color:#fff;}
.ma .mprimary:hover{background:#43a047;}
.ma .mcancel{background:#333;color:#aaa;}
.ma .mcancel:hover{background:#3a3a3a;}
/* leaflet-draw toolbar dark theme */
.leaflet-draw-toolbar a{background-color:#2a2a2a;border-color:#444;}
.leaflet-draw-toolbar a:hover{background-color:#383838;}
.leaflet-draw-section{background-color:#222;}
</style>

</div>
<div id="zone-modal">

      <button class="mprimary" onclick="confirmAddZone()">Add &amp; Draw</button>
    </div>
  </div>
</div>

function detectCategory(name) {
  const n = name.toLowerCase();
  if (/brew(ing|ery)|taproom|tap room|ale brew|distill|cider/.test(n)) return "Brewery";
  if (/crossfit|fitness|gym|cycle|cycling|bike shop/.test(n)) return "Fitness/Gym";
  if (/hotel|inn|resort|lodge|summercamp|mariner|nantucket hotel|marriott|sheraton|aloft|element hotel/.test(n)) return "Hotel/Inn";
  if (/whole foods|market|provisions|grocery|supermarket|crosby|roche bros|mckinnon|donelan|atkins farm|shaw's|ring bros|butcher boy|clements|pemberton farm|guido's|art's specialties|needham center|co-op|coop|general store|volante|weston provisions|davids fresh|american provisions|urban greens|meadowbrook farm|appleton|new england country|wards berry|automated food/.test(n)) return "Grocery/Market";
  if (/farm|orchard|vineyard|farm stand|berry farm/.test(n)) return "Farm/Orchard";
  if (/bakery|baking|bake shop|donut|bagels|bagel|bread|patisserie|cookie|pastry|monstah|crumbl/.test(n)) return "Bakery";
  if (/ice cream|gelato|sorbet|creamery/.test(n)) return "Ice Cream";
  if (/cafe|coffee|cup|roasters|espresso|cappuccino|bean|brew bar|nitro|pour|grind|grounds|coffeehouse/.test(n)) return "Cafe/Coffee";
  if (/catering|caterers|aramark|sodexo|compass group|gourmet|sipwithme|encore|gourmet caterers|prestige services|realfood/.test(n)) return "Catering/Food Svc";
  if (/analytics|energy|biomedical|pharmaceutical|lab|innovation|technology|reiser|nova bio|nova biomed|lga|cell signaling|formlabs|form energy|mass pay|greystar|reveneer|c-4|coordinates op|wood mackenzie|ezcater/.test(n)) return "Corporate/Office";
  if (/restaurant|kitchen|bistro|grille|grill|pub|bar|tavern|diner|eatery|supper|dining|ristorante|bbq|barbecue|sushi|steakhouse|brasserie|cantina|trattoria|osteria|seafood/.test(n)) return "Restaurant/Bar";
  return "Cafe/Coffee"; // default for most unknowns
}

function getDeliveryDay(tags) {
  const t = tags.map(x => x.toLowerCase());
  if (t.includes("monday")) return "Monday";
  if (t.includes("tuesday")) return "Tuesday";
  if (t.includes("wednesday")) return "Wednesday";
  if (t.includes("thursday")) return "Thursday";
  if (t.includes("friday")) return "Friday";
  if (tags.some(x => x === "Ship")) return "Ship";
  if (tags.some(x => x === "Pick-up")) return "Pick-up";
  return "Unknown";
}

function getFulfillment(tags) {
  if (tags.includes("local-dlv")) return "Local Delivery";
  if (tags.some(x => x === "Ship")) return "Ship";
  if (tags.some(x => x === "Pick-up")) return "Pick-up";
  if (tags.includes("copack")) return "Co-Pack";
  return "Unknown";
}

// ─── PROCESS DATA ─────────────────────────────────────────────────────────────
const LOCATIONS = RAW.map(([company, location, addr1, addr2, city, state, zip, tagsCsv, _lat, _lng], i) => {
  const tags = tagsCsv ? tagsCsv.split(",").map(t => t.trim()).filter(Boolean) : [];
  const displayName = location && location.trim() ? `${company} – ${location}` : company;
  const fullAddr = [addr1, addr2, city, state, zip].filter(Boolean).join(", ");
  return {
    id: i,
    company,
    location: displayName,
    addr1, addr2, city, state, zip,
    fullAddr,
    geocodeKey: `${addr1}, ${city}, ${state} ${zip}`,
    tags,
    category: detectCategory(company),
    deliveryDay: getDeliveryDay(tags),
    fulfillment: getFulfillment(tags),
    lat: (_lat != null) ? _lat : null,
    lng: (_lng != null) ? _lng : null,
  };
});

// ─── MAP SETUP ────────────────────────────────────────────────────────────────
const map = L.map("map").setView([42.42, -70.95], 9);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

const markerLayer = L.layerGroup().addTo(map);

function makeMarker(loc) {
  const cat = CATS[loc.category] || CATS["Other"];
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="32" viewBox="0 0 24 32">
    <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 20 12 20s12-11 12-20C24 5.4 18.6 0 12 0z" fill="${cat.color}" stroke="white" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="5" fill="white" opacity="0.9"/>
  </svg>`;
  const icon = L.divIcon({
    html: svg,
    iconSize: [24, 32],
    iconAnchor: [12, 32],
    popupAnchor: [0, -32],
    className: "",
  });

  const popup = `
    <b>${loc.location}</b>
    <div class="popup-category">${loc.category}</div>
    ${loc.addr1}${loc.addr2 ? ", "+loc.addr2 : ""}<br>
    ${loc.city}, ${loc.state} ${loc.zip}<br>
    <div style="margin-top:4px;">
      <span class="popup-tag" style="background:${DAY_COLORS[loc.deliveryDay]}20;color:${DAY_COLORS[loc.deliveryDay]};border:1px solid ${DAY_COLORS[loc.deliveryDay]}40;">${loc.deliveryDay}</span>
      <span class="popup-tag">${loc.fulfillment}</span>
    </div>`;

  return L.marker([loc.lat, loc.lng], { icon })
    .bindPopup(popup)
    .on("popupopen", () => map.setView([loc.lat, loc.lng], Math.max(map.getZoom(), 14)));
}

// ─── FILTERS ──────────────────────────────────────────────────────────────────
const FILTERABLE_DAYS = new Set(["Monday","Tuesday","Wednesday","Thursday","Friday","Ship"]);
let activeTypes = new Set(Object.keys(CATS));
let activeDays  = new Set(FILTERABLE_DAYS);
let searchQuery = "";

document.getElementById("search-input").addEventListener("input", function() {
  searchQuery = this.value.trim().toLowerCase();
  refreshMarkers();
});

function countBy(arr, key, val) { return arr.filter(l => l.lat && l[key] === val).length; }

function buildFilters() {
  const typeDiv = document.getElementById("type-filters");
  const dayDiv  = document.getElementById("day-filters");

  // clear before rebuilding
  typeDiv.innerHTML = `<button class="filter-btn active" id="all-btn" onclick="toggleAll()">All Types</button>`;
  dayDiv.innerHTML  = "";

  Object.entries(CATS).forEach(([name, meta]) => {
    const c = countBy(LOCATIONS, "category", name);
    const btn = document.createElement("button");
    btn.className = "filter-btn active";
    btn.dataset.type = name;
    btn.innerHTML = `<span class="dot" style="background:${meta.color}"></span>${name}<span class="count">${c}</span>`;
    btn.onclick = () => toggleType(name, btn);
    typeDiv.appendChild(btn);
  });

  Object.entries(DAY_COLORS).forEach(([day, col]) => {
    const c = countBy(LOCATIONS, "deliveryDay", day);
    const btn = document.createElement("button");
    btn.className = "filter-btn active";
    btn.dataset.day = day;
    btn.innerHTML = `<span class="dot" style="background:${col}"></span>${day}<span class="count">${c}</span>`;
    btn.onclick = () => toggleDay(day, btn);
    dayDiv.appendChild(btn);
  });
}

function toggleType(name, btn) {
  if (activeTypes.has(name)) { activeTypes.delete(name); btn.classList.remove("active"); }
  else { activeTypes.add(name); btn.classList.add("active"); }
  refreshMarkers();
}

function toggleDay(day, btn) {
  if (activeDays.has(day)) { activeDays.delete(day); btn.classList.remove("active"); }
  else { activeDays.add(day); btn.classList.add("active"); }
  refreshMarkers();
}


function toggleAll() {
  const btn = document.getElementById("all-btn");
  const allOn = activeTypes.size === Object.keys(CATS).length;
  document.querySelectorAll("[data-type]").forEach(b => {
    if (allOn) { activeTypes.delete(b.dataset.type); b.classList.remove("active"); }
    else { activeTypes.add(b.dataset.type); b.classList.add("active"); }
  });
  btn.classList.toggle("active", !allOn);
  refreshMarkers();
}

function refreshMarkers() {
  markerLayer.clearLayers();
  let visible = 0;
  const matches = [];
  LOCATIONS.forEach(loc => {
    if (!loc.lat) return;
    if (!activeTypes.has(loc.category)) return;
    if (FILTERABLE_DAYS.has(loc.deliveryDay) && !activeDays.has(loc.deliveryDay)) return;
    if (searchQuery) {
      const haystack = `${loc.company} ${loc.location} ${loc.city}`.toLowerCase();
      if (!haystack.includes(searchQuery)) return;
    }
    const marker = makeMarker(loc);
    markerLayer.addLayer(marker);
    matches.push({ loc, marker });
    visible++;
  });
  if (searchQuery && matches.length === 1) {
    map.setView([matches[0].loc.lat, matches[0].loc.lng], 15);
    matches[0].marker.openPopup();
  }
  const placed = LOCATIONS.filter(l => l.lat).length;
  document.getElementById("stats-line").textContent =
    `${visible} shown · ${placed} geocoded / ${LOCATIONS.length} total`;
}

// ─── GEOCODING ────────────────────────────────────────────────────────────────
const CACHE_KEY = "acr_map_geo_v2";
let geoCache = {};
try { geoCache = JSON.parse(localStorage.getItem(CACHE_KEY)) || {}; } catch(e) {}

let geocodedCount = 0;
let geocodeQueue = [];
let geocodeRunning = false;

function updateProgress() {
  const total = LOCATIONS.length;
  const pct = Math.round(geocodedCount / total * 100);
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-text").textContent = `${geocodedCount} / ${total} geocoded`;
  if (geocodedCount >= total) {
    document.getElementById("progress-bar").style.display = "none";
    buildFilters();
    refreshMarkers();
    saveCache();
  }
}

async function geocodeOne(loc) {
  const key = loc.geocodeKey;
  if (geoCache[key]) {
    loc.lat = geoCache[key][0];
    loc.lng = geoCache[key][1];
    geocodedCount++;
    updateProgress();
    if (geocodedCount % 10 === 0) { buildFilters(); refreshMarkers(); }
    return;
  }
  try {
    const q = encodeURIComponent(`${loc.addr1}, ${loc.city}, ${loc.state} ${loc.zip}, USA`);
    const url = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&countrycodes=us`;
    const res = await fetch(url, { headers: { "Accept-Language": "en" } });
    const data = await res.json();
    if (data && data[0]) {
      loc.lat = parseFloat(data[0].lat);
      loc.lng = parseFloat(data[0].lon);
      geoCache[key] = [loc.lat, loc.lng];
    } else {
      // try city-level fallback
      const q2 = encodeURIComponent(`${loc.city}, ${loc.state} ${loc.zip}, USA`);
      const res2 = await fetch(`https://nominatim.openstreetmap.org/search?q=${q2}&format=json&limit=1&countrycodes=us`);
      const data2 = await res2.json();
      if (data2 && data2[0]) {
        loc.lat = parseFloat(data2[0].lat);
        loc.lng = parseFloat(data2[0].lon);
        geoCache[key] = [loc.lat, loc.lng];
      }
    }
  } catch(e) {}
  geocodedCount++;
  updateProgress();
  if (geocodedCount % 10 === 0) { buildFilters(); refreshMarkers(); }
}

function saveCache() {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(geoCache)); } catch(e) {}
}

async function runGeocodingQueue() {
  if (geocodeRunning) return;
  geocodeRunning = true;
  for (const loc of geocodeQueue) {
    await geocodeOne(loc);
    if (!geoCache[loc.geocodeKey]) continue; // was cached
    await new Promise(r => setTimeout(r, 1050)); // Nominatim 1 req/sec
  }
  geocodeRunning = false;
  saveCache();
}

// Pre-embedded coords from server-side geocoding — fill cache and queue remainder
const needGeocode = [];
LOCATIONS.forEach(loc => {
  if (loc.lat != null && loc.lng != null) {
    geoCache[loc.geocodeKey] = [loc.lat, loc.lng];
    geocodedCount++;
  } else {
    const key = loc.geocodeKey;
    if (geoCache[key]) {
      loc.lat = geoCache[key][0];
      loc.lng = geoCache[key][1];
      geocodedCount++;
    } else {
      needGeocode.push(loc);
    }
  }
});

geocodeQueue = needGeocode;
buildFilters();
refreshMarkers();

if (needGeocode.length > 0) {
  updateProgress();
  runGeocodingQueue();
} else {
  document.getElementById("progress-bar").style.display = "none";
  document.getElementById("stats-line").textContent =
    `${LOCATIONS.filter(l=>l.lat).length} shown · ${LOCATIONS.length} total`;
}

// Build GeoJSON from lat/lng pairs. Closes ring automatically.
function _p(ll) {
  const ring = ll.map(([a,b])=>[b,a]); ring.push(ring[0]);
  return {type:"FeatureCollection",features:[{type:"Feature",properties:{},geometry:{type:"Polygon",coordinates:[ring]}}]};
}
// Multi-polygon: array of lat/lng arrays
function _mp(rings) {
  return {type:"FeatureCollection",features:rings.map(ll=>{
    const ring=ll.map(([a,b])=>[b,a]); ring.push(ring[0]);
    return {type:"Feature",properties:{},geometry:{type:"Polygon",coordinates:[ring]}};
  })};
}

  // ── Wednesday 2: Burlington MA / Route 128 N corridor
  {id:"wed-2",name:"Wednesday 2",color:"#A5D6A7",visible:true,geojson:_p([
    [42.528,-71.265],[42.528,-71.158],[42.462,-71.158],[42.462,-71.265]
  ])},
  // ── Friday North Shore: Wakefield/Melrose → Peabody/Danvers → Beverly/Salem → Manchester → Gloucester/Ipswich
  {id:"fri-shore",name:"Friday North Shore",color:"#6A1B9A",visible:true,geojson:_p([
    [42.436,-71.088],[42.462,-71.052],[42.490,-71.010],[42.492,-70.955],
    [42.492,-70.840],[42.565,-70.800],[42.580,-70.748],[42.620,-70.615],
    [42.650,-70.615],[42.695,-70.832],[42.650,-70.882],[42.600,-70.930],
    [42.560,-70.968],[42.530,-71.012],[42.436,-71.088]
  ])},
  // ── Route 1 & Shipping: dispersed ship/pickup accounts — draw as needed
  {id:"route-1",name:"Route 1 & Shipping",color:"#455A64",visible:true,geojson:null},
  // ── Route 2 Clients: dispersed — draw as needed
  {id:"route-2",name:"Route 2 Clients",color:"#78909C",visible:true,geojson:null},
];

let zones = [];
let zoneLayers = {};
let currentEditId = null;
let drawCtrl = null;
let editFG = null;

function loadZones() {
  try {
    const s = JSON.parse(localStorage.getItem(ZONE_KEY));
    zones = Array.isArray(s) ? s : JSON.parse(JSON.stringify(ZONE_DEFAULTS));
  } catch(e) {
    zones = JSON.parse(JSON.stringify(ZONE_DEFAULTS));
  }
}

function saveZones() {
  try { localStorage.setItem(ZONE_KEY, JSON.stringify(zones)); } catch(e) {}
}

function renderZoneLayers() {
  Object.values(zoneLayers).forEach(fg=>{ try{fg.remove();}catch(e){} });
  zoneLayers = {};
  zones.forEach(zone=>{
    const fg = L.featureGroup();
    if (zone.geojson && zone.visible) {
      try {
        L.geoJSON(zone.geojson, {
          style:{color:zone.color,weight:2.5,opacity:.8,fillColor:zone.color,fillOpacity:.12}
        }).eachLayer(l=>fg.addLayer(l));
      } catch(e) {}
    }
    zoneLayers[zone.id] = fg;
    if (zone.visible) fg.addTo(map);
  });
}

function renderZoneList() {
  const list = document.getElementById("zone-list");
  list.innerHTML = "";
  zones.forEach(zone=>{
    const hasGeo = zone.geojson && zone.geojson.features && zone.geojson.features.length > 0;
    const item = document.createElement("div");
    item.className = "zone-item";
    item.innerHTML =
      `<span class="zone-swatch" style="background:${zone.color}"></span>` +
      `<span class="zone-name" title="${zone.name}">${zone.name}</span>` +
      `<button class="zone-vis ${zone.visible?'on':''}" onclick="toggleZoneVis('${zone.id}')" title="${zone.visible?'Hide':'Show'}">${zone.visible?'●':'○'}</button>` +
      `<button class="zone-edit-btn" onclick="startEditZone('${zone.id}')">${hasGeo?'Edit':'Draw'}</button>`;
    list.appendChild(item);
  });
}

function toggleZoneVis(id) {
  const z = zones.find(x=>x.id===id); if (!z) return;
  z.visible = !z.visible;
  if (z.visible) { if(zoneLayers[id]) zoneLayers[id].addTo(map); }
  else { if(zoneLayers[id]) zoneLayers[id].remove(); }
  saveZones(); renderZoneList();
}

function startEditZone(id) {
  if (currentEditId) finishEdit(false);
  const zone = zones.find(x=>x.id===id); if (!zone) return;
  currentEditId = id;

  document.getElementById("zone-edit-panel").classList.add("active");
  document.getElementById("editing-name").value = zone.name;
  document.getElementById("editing-color").value = zone.color;

  editFG = L.featureGroup().addTo(map);
  if (zone.geojson) {
    try {
      L.geoJSON(zone.geojson, {
        style:{color:zone.color,weight:2.5,opacity:.85,fillColor:zone.color,fillOpacity:.2}
      }).eachLayer(l=>editFG.addLayer(l));
    } catch(e) {}
  }

  if (zoneLayers[id]) zoneLayers[id].remove();

  drawCtrl = new L.Control.Draw({
    position:"topleft",
    draw:{
      polygon:{
        allowIntersection:false,
        showArea:false,
        shapeOptions:{color:zone.color,fillColor:zone.color,fillOpacity:.2,weight:2.5,opacity:.85}
      },
      polyline:false, rectangle:false, circle:false, circlemarker:false, marker:false
    },
    edit:{ featureGroup:editFG }
  });
  map.addControl(drawCtrl);

  if (editFG.getLayers().length > 0) {
    try { map.fitBounds(editFG.getBounds(), {padding:[40,40]}); } catch(e) {}
  }

  map.on("draw:created", onZoneDrawCreated);
  map.on("draw:edited",  onZoneEdited);
  map.on("draw:deleted", onZoneEdited);
}

function onZoneDrawCreated(e) { editFG.addLayer(e.layer); snapshotZone(); }
function onZoneEdited() { snapshotZone(); }

function snapshotZone() {
  if (!currentEditId || !editFG) return;
  const zone = zones.find(x=>x.id===currentEditId); if (!zone) return;
  const gj = editFG.toGeoJSON();
  zone.geojson = (gj.features && gj.features.length > 0) ? gj : null;
  saveZones();
}

function finishEdit(rerender) {
  if (!currentEditId) return;
  const zone = zones.find(x=>x.id===currentEditId);
  if (zone && editFG) {
    zone.name  = document.getElementById("editing-name").value.trim() || zone.name;
    zone.color = document.getElementById("editing-color").value;
    zone.geojson = (()=>{ const gj=editFG.toGeoJSON(); return (gj.features&&gj.features.length>0)?gj:null; })();
    saveZones();
  }
  if (drawCtrl) { try{map.removeControl(drawCtrl);}catch(e){} drawCtrl=null; }
  if (editFG)   { try{editFG.remove();}catch(e){} editFG=null; }
  map.off("draw:created", onZoneDrawCreated);
  map.off("draw:edited",  onZoneEdited);
  map.off("draw:deleted", onZoneEdited);
  document.getElementById("zone-edit-panel").classList.remove("active");
  currentEditId = null;
  if (rerender !== false) { renderZoneLayers(); renderZoneList(); }
}

function doneEditingZone() { finishEdit(true); }

function deleteEditingZone() {
  if (!currentEditId) return;
  const zone = zones.find(x=>x.id===currentEditId); if (!zone) return;
  if (!confirm(`Delete zone "${zone.name}"?`)) return;
  zones = zones.filter(x=>x.id!==currentEditId);
  saveZones();
  finishEdit(false);
  renderZoneLayers(); renderZoneList();
}

function openAddZoneModal() {
  document.getElementById("modal-zone-name").value = "";
  document.getElementById("modal-zone-color").value = "#2196F3";
  document.getElementById("zone-modal").classList.add("open");
  setTimeout(()=>document.getElementById("modal-zone-name").focus(), 50);
}
function closeAddZoneModal() {
  document.getElementById("zone-modal").classList.remove("open");
}
function confirmAddZone() {
  const name = document.getElementById("modal-zone-name").value.trim();
  if (!name) { document.getElementById("modal-zone-name").focus(); return; }
  const color = document.getElementById("modal-zone-color").value;
  const id = "z_" + Date.now();
  zones.push({id, name, color, visible:true, geojson:null});
  saveZones(); closeAddZoneModal();
  renderZoneLayers(); renderZoneList();
  startEditZone(id);
}

document.getElementById("editing-color").addEventListener("input", function() {
  if (!currentEditId || !editFG) return;
  const c = this.value;
  editFG.eachLayer(l=>{ if(l.setStyle) l.setStyle({color:c,fillColor:c}); });
});

loadZones();
renderZoneLayers();
renderZoneList();
</script>
</body>
